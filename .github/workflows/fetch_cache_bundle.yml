name: Fetch cache bundle

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Fetch job id, for example job_20260618_120030"
        required: true
        default: "job_20260618_120030"
      job_csv_path:
        description: "Path to fetch job CSV inside the repo or worker package"
        required: true
        default: "data/jobs/fetch_job_job_20260618_120030.csv"
      job_json_path:
        description: "Path to fetch job JSON inside the repo or worker package"
        required: true
        default: "data/jobs/fetch_job_job_20260618_120030.json"
      worker_package_path:
        description: "Optional worker package zip path. Leave blank to use the checked-out repo."
        required: false
        default: "data/jobs/packages/external_fetch_worker_job_20260618_120030.zip"
      backend:
        description: "Fetch backend"
        required: true
        default: "python"
        type: choice
        options:
          - python
          - powershell
          - curl
      delay_seconds:
        description: "Delay between result page requests"
        required: true
        default: "1.0"

jobs:
  fetch-cache-bundle:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare worker directory
        shell: pwsh
        env:
          WORKER_PACKAGE_PATH: ${{ inputs.worker_package_path }}
        run: |
          if ($env:WORKER_PACKAGE_PATH -and (Test-Path -LiteralPath $env:WORKER_PACKAGE_PATH)) {
            New-Item -ItemType Directory -Force -Path "_fetch_worker" | Out-Null
            Expand-Archive -LiteralPath $env:WORKER_PACKAGE_PATH -DestinationPath "_fetch_worker" -Force
            "WORKDIR=_fetch_worker" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "WORKDIR=." | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install worker package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e $env:WORKDIR

      - name: Validate fetch job files
        shell: pwsh
        env:
          JOB_CSV_PATH: ${{ inputs.job_csv_path }}
          JOB_JSON_PATH: ${{ inputs.job_json_path }}
        run: |
          $jobCsv = Join-Path $env:WORKDIR $env:JOB_CSV_PATH
          $jobJson = Join-Path $env:WORKDIR $env:JOB_JSON_PATH
          if (-not (Test-Path -LiteralPath $jobCsv)) {
            throw "Fetch job CSV was not found: $jobCsv"
          }
          if (-not (Test-Path -LiteralPath $jobJson)) {
            throw "Fetch job JSON was not found: $jobJson"
          }

      - name: Fetch official result HTML
        shell: pwsh
        env:
          JOB_CSV_PATH: ${{ inputs.job_csv_path }}
          BACKEND: ${{ inputs.backend }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
        run: |
          Set-Location $env:WORKDIR
          python -m nankan_ai.fetch_result_pages $env:JOB_CSV_PATH --apply --backend $env:BACKEND --delay-seconds $env:DELAY_SECONDS

      - name: Build cache bundle
        shell: pwsh
        env:
          JOB_ID: ${{ inputs.job_id }}
          JOB_CSV_PATH: ${{ inputs.job_csv_path }}
          JOB_JSON_PATH: ${{ inputs.job_json_path }}
        run: |
          Set-Location $env:WORKDIR
          python -m nankan_ai.build_cache_bundle --job-id $env:JOB_ID --job-csv-path $env:JOB_CSV_PATH --job-json-path $env:JOB_JSON_PATH

      - name: Collect artifacts
        shell: pwsh
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          New-Item -ItemType Directory -Force -Path "workflow_artifacts" | Out-Null
          $bundlePath = Join-Path $env:WORKDIR "data/cache/bundles/cache_bundle_$($env:JOB_ID).zip"
          Copy-Item -LiteralPath $bundlePath -Destination "workflow_artifacts/"
          $fetchLog = Join-Path $env:WORKDIR "data/cache/metadata/fetch_log.csv"
          if (Test-Path -LiteralPath $fetchLog) {
            Copy-Item -LiteralPath $fetchLog -Destination "workflow_artifacts/"
          }

      - name: Upload cache bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache-bundle-${{ inputs.job_id }}
          path: workflow_artifacts/
          if-no-files-found: error
